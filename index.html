<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sock Opname Mobile - PT HRS Site BPR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .nav-item { transition: all 0.2s ease; cursor: pointer; color: #94a3b8; }
        .nav-item.active { color: #60a5fa; }
        .card-status-ok { border-left: 4px solid #10b981; }
        .card-status-none { border-left: 4px solid #cbd5e1; }
        #toast { visibility: hidden; min-width: 200px; background-color: #10b981; color: #fff; text-align: center; border-radius: 12px; padding: 12px; position: fixed; z-index: 1000; left: 50%; bottom: 100px; transform: translateX(-50%); font-size: 12px; font-weight: bold; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        #toast.show { visibility: visible; animation: fadeinout 2s; }
        @keyframes fadeinout { 0% { bottom: 80px; opacity: 0; } 20% { bottom: 100px; opacity: 1; } 80% { bottom: 100px; opacity: 1; } 100% { bottom: 80px; opacity: 0; } }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mb-4"></div>
        <p class="text-xs font-bold text-blue-900 uppercase tracking-widest">Sinkronisasi Data...</p>
    </div>

    <div id="toast">Data Berhasil Diupdate</div>

    <header class="bg-blue-950 text-white p-5 sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <h1 id="headerTitle" class="text-sm font-semibold tracking-wider uppercase text-blue-400">Input Opname</h1>
                <p id="syncStatus" class="text-[9px] font-medium text-slate-400 uppercase mt-0.5">Memuat data...</p>
            </div>
            <button onclick="fetchSheetData()" class="p-2 bg-blue-900 rounded-lg active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto pb-32">
        <section id="pageHistory" class="page-content p-4">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Aktivitas Terakhir</h2>
            <div id="historyList" class="space-y-3 text-center py-10 text-slate-300 text-[10px] font-bold uppercase tracking-widest">Belum ada riwayat</div>
        </section>

        <section id="pageDeviasi" class="page-content p-4">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Daftar Deviasi</h2>
            <div id="deviasiList" class="space-y-3 text-center py-10 text-slate-300 text-[10px] font-bold uppercase tracking-widest">Tidak ada deviasi</div>
        </section>

        <section id="pageInputList" class="page-content active p-4">
            <div class="mb-4">
                <input type="text" id="searchInput" onkeyup="renderInputList()" placeholder="Cari Material, Mnemonic, atau Bin..." 
                       class="w-full p-4 rounded-xl border border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium bg-white">
            </div>
            <div id="inputItemContainer" class="space-y-3"></div>
        </section>

        <section id="pageDashboard" class="page-content p-4">
            <div class="bg-white p-6 rounded-3xl border shadow-sm text-center">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest border-b pb-2">Progress Audit</h3>
                <div class="flex justify-between items-center mb-4 px-4">
                    <div class="text-left">
                        <p class="text-4xl font-bold text-emerald-600" id="dashChecked">0</p>
                        <p class="text-[10px] font-semibold text-slate-400 uppercase">Verified</p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-bold text-slate-800" id="dashTotal">0</p>
                        <p class="text-[10px] font-semibold text-slate-400 uppercase">Total SKU</p>
                    </div>
                </div>
                <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div id="dashBar" class="h-full bg-emerald-500 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <section id="pageInventory" class="page-content p-4">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Data Seluruh Inventory</h2>
            <div class="mb-4">
                <input type="text" id="inventorySearch" onkeyup="renderInventoryList()" placeholder="Cari di seluruh database..." 
                       class="w-full p-3 rounded-xl border border-slate-200 bg-white text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div id="inventoryContainer" class="space-y-2"></div>
        </section>

        <!-- Detail Input Overlay -->
        <section id="pageInputDetail" class="page-content p-5">
            <button onclick="navigateTo('pageInputList', 'Input Opname')" class="mb-5 flex items-center text-blue-900 font-bold text-xs uppercase">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7" /></svg> Kembali
            </button>
            <div class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100">
                <div class="mb-6">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Material Number</p>
                    <h2 id="detMaterial" class="text-2xl font-bold text-blue-950 tracking-tight">--</h2>
                    <h3 id="detName" class="text-sm font-semibold text-slate-700 uppercase mt-2">--</h3>
                    <div id="detMeta" class="flex flex-wrap gap-2 mt-4"></div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-50 p-5 rounded-2xl text-center">
                        <p class="text-[10px] font-bold uppercase text-slate-400 mb-1">Stok SAP</p>
                        <p id="detSystem" class="text-3xl font-bold text-slate-800">0</p>
                    </div>
                    <div class="bg-blue-50 p-5 rounded-2xl text-center border-2 border-blue-200">
                        <p class="text-[10px] font-bold uppercase text-blue-600 mb-1">Fisik</p>
                        <input type="number" id="fieldPhysical" inputmode="decimal" class="w-full bg-transparent text-3xl font-bold text-blue-900 text-center outline-none" placeholder="0">
                    </div>
                </div>
                <button onclick="submitOpname()" class="w-full bg-blue-950 text-white font-bold py-4 rounded-xl uppercase text-xs tracking-widest">Update Hasil</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-blue-950 h-20 flex justify-around items-center z-[100] shadow-2xl px-1">
        <button onclick="navigateTo('pageHistory', 'Riwayat')" id="nav-pageHistory" class="nav-item flex flex-col items-center w-1/5">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-[8px] font-bold uppercase mt-1">Riwayat</span>
        </button>
        <button onclick="navigateTo('pageDeviasi', 'Deviasi')" id="nav-pageDeviasi" class="nav-item flex flex-col items-center w-1/5">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
            <span class="text-[8px] font-bold uppercase mt-1">Deviasi</span>
        </button>
        <button onclick="navigateTo('pageInputList', 'Input Opname')" id="nav-pageInputList" class="nav-item active flex flex-col items-center w-1/5">
            <div class="bg-blue-600 text-white p-3 rounded-xl shadow-xl -mt-10 border-4 border-blue-950">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4" /></svg>
            </div>
            <span class="text-[8px] font-bold uppercase mt-2 text-blue-400">Scan</span>
        </button>
        <button onclick="navigateTo('pageDashboard', 'Dashboard')" id="nav-pageDashboard" class="nav-item flex flex-col items-center w-1/5">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
            <span class="text-[8px] font-bold uppercase mt-1">Stats</span>
        </button>
        <button onclick="navigateTo('pageInventory', 'Inventory')" id="nav-pageInventory" class="nav-item flex flex-col items-center w-1/5">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
            <span class="text-[8px] font-bold uppercase mt-1">Items</span>
        </button>
    </nav>

    <script>
        // Ganti URL ini dengan Link CSV "Publish to Web" Google Sheets Anda
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSa-G_JUHJ4thrMO9Gxj5qbRMjAvNm22gW85xJ4FbXAwF02DcBdtqmjxWPhMZTAo3ejq3kc-ncNeBap/pub?output=csv";
        
        let inventory = [];
        let logs = [];
        let selectedMaterial = null;

        window.onload = fetchSheetData;

        async function fetchSheetData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                // Gunakan timestamp t= untuk menghindari cache browser agar data selalu terbaru
                const response = await fetch(`${sheetUrl}&t=${new Date().getTime()}`);
                const data = await response.text();
                parseCSV(data);
                document.getElementById('syncStatus').innerText = "Update: " + new Date().toLocaleTimeString('id-ID');
            } catch (error) {
                console.error("Gagal ambil data:", error);
                alert("Koneksi Error. Pastikan link Spreadsheet sudah di-Publish ke Web sebagai CSV.");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split(/\r?\n/);
            if (lines.length < 2) return;

            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            
            // Pencarian kolom dinamis berdasarkan kata kunci di header Excel Anda
            const colIdx = {
                mat: headers.findIndex(h => h.includes('material') && !h.includes('desc')),
                desc: headers.findIndex(h => h.includes('description')),
                mne: headers.findIndex(h => h.includes('mnemonic')),
                bin: headers.findIndex(h => h.includes('bin')),
                soh: headers.findIndex(h => h.includes('soh')),
                uom: headers.findIndex(h => h.includes('uom')),
                sloc: headers.findIndex(h => h.includes('sloc')),
                part: headers.findIndex(h => h.includes('part no'))
            };

            inventory = lines.slice(1).map(line => {
                const row = parseCSVRow(line);
                if (row.length < headers.length) return null;
                
                return {
                    material: row[colIdx.mat] || '',
                    name: row[colIdx.desc] || '',
                    mnemonic: row[colIdx.mne] || '',
                    sloc: row[colIdx.sloc] || '',
                    bin: row[colIdx.bin] || '',
                    uom: row[colIdx.uom] || 'PC',
                    part: row[colIdx.part] || '',
                    system: parseFloat(row[colIdx.soh]) || 0,
                    checked: false
                };
            }).filter(i => i !== null && i.material !== '');

            // Refresh semua tampilan agar data baru muncul
            renderInputList();
            renderInventoryList();
            renderDashboard();
        }

        function parseCSVRow(text) {
            const res = [];
            let p = '', inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') inQuotes = !inQuotes;
                else if (c === ',' && !inQuotes) { res.push(p.trim()); p = ''; }
                else p += c;
            }
            res.push(p.trim());
            return res;
        }

        // Halaman Opname (Menu 3)
        function renderInputList() {
            const container = document.getElementById('inputItemContainer');
            const q = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';
            
            const filtered = inventory.filter(i => 
                i.material.toLowerCase().includes(q) || 
                i.name.toLowerCase().includes(q) || 
                i.bin.toLowerCase().includes(q)
            ).slice(0, 30); // Tampilkan 30 saja agar performa cepat
            
            filtered.forEach(i => {
                const card = document.createElement('div');
                card.className = `bg-white rounded-xl shadow-sm border border-slate-200 p-4 active:scale-95 transition-all cursor-pointer ${i.checked ? 'card-status-ok' : 'card-status-none'}`;
                card.onclick = () => openDetail(i);
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1 overflow-hidden">
                            <div class="flex gap-2 mb-1">
                                <span class="text-[8px] font-bold text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded uppercase">${i.sloc}</span>
                                <span class="text-[8px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded uppercase">${i.bin}</span>
                            </div>
                            <h3 class="text-sm font-bold text-blue-950">${i.material}</h3>
                            <p class="text-[10px] text-slate-500 uppercase truncate">${i.name}</p>
                        </div>
                        <div class="text-right ml-2 border-l pl-3 border-slate-100">
                            <p class="text-[8px] font-bold text-slate-300">SOH</p>
                            <p class="text-lg font-bold text-slate-800">${i.system}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Halaman Inventory (Menu 5) - FULL DINAMIS
        function renderInventoryList() {
            const container = document.getElementById('inventoryContainer');
            const q = document.getElementById('inventorySearch').value.toLowerCase();
            container.innerHTML = '';
            
            // Mengambil data langsung dari variabel inventory (Hasil Sync)
            const filtered = inventory.filter(i => 
                i.material.toLowerCase().includes(q) || 
                i.name.toLowerCase().includes(q) || 
                i.mnemonic.toLowerCase().includes(q)
            );
            
            if(filtered.length === 0) {
                container.innerHTML = `<p class="text-center py-10 text-xs font-bold text-slate-300 uppercase tracking-widest">Item tidak ditemukan</p>`;
                return;
            }

            filtered.slice(0, 100).forEach(i => {
                const item = document.createElement('div');
                item.className = "bg-white p-3 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm";
                item.innerHTML = `
                    <div class="flex-1 overflow-hidden mr-2">
                        <div class="flex items-center gap-1.5">
                           <p class="text-[10px] font-bold text-blue-900">${i.material}</p>
                           <span class="text-[7px] text-slate-400 font-bold px-1 bg-slate-50 border border-slate-100 rounded">${i.mnemonic}</span>
                        </div>
                        <p class="text-[9px] text-slate-500 uppercase truncate font-medium">${i.name}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[11px] font-bold text-slate-800">${i.system} <span class="text-[8px] text-slate-400 uppercase">${i.uom}</span></p>
                        <p class="text-[7px] text-blue-400 font-bold uppercase tracking-tighter">${i.bin}</p>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function openDetail(item) {
            selectedMaterial = item;
            document.getElementById('detMaterial').innerText = item.material;
            document.getElementById('detName').innerText = item.name;
            document.getElementById('detSystem').innerText = item.system;
            document.getElementById('detMeta').innerHTML = `
                <span class="bg-blue-900 text-white px-2 py-1 rounded text-[9px] font-bold uppercase">${item.mnemonic}</span>
                <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-[9px] font-bold uppercase">Bin: ${item.bin}</span>
                <span class="bg-slate-100 text-slate-400 px-2 py-1 rounded text-[9px] font-bold uppercase">P/N: ${item.part}</span>
            `;
            document.getElementById('fieldPhysical').value = '';
            navigateTo('pageInputDetail', 'Audit Fisik');
            setTimeout(() => document.getElementById('fieldPhysical').focus(), 300);
        }

        function submitOpname() {
            const phys = parseFloat(document.getElementById('fieldPhysical').value);
            if(isNaN(phys)) return;
            
            const diff = phys - selectedMaterial.system;
            selectedMaterial.checked = true;
            
            // Simpan log aksi
            logs.unshift({ material: selectedMaterial.material, time: new Date().toLocaleTimeString(), diff: diff });
            
            showToast();
            renderDashboard();
            renderHistory();
            renderDeviasi();
            setTimeout(() => navigateTo('pageInputList', 'Input Opname'), 300);
            renderInputList();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if(logs.length === 0) return;
            list.innerHTML = logs.map(l => `
                <div class="bg-white p-4 rounded-xl border-l-4 ${l.diff === 0 ? 'border-emerald-500' : 'border-rose-500'} flex justify-between items-center shadow-sm">
                    <div>
                        <div class="text-[10px] font-bold text-slate-800">${l.material}</div>
                        <div class="text-[8px] text-slate-400 uppercase font-medium">${l.time}</div>
                    </div>
                    <span class="text-[9px] font-bold uppercase ${l.diff === 0 ? 'text-emerald-600' : 'text-rose-600'}">${l.diff === 0 ? 'Match' : 'Deviasi: ' + l.diff}</span>
                </div>
            `).join('');
        }

        function renderDeviasi() {
            const list = document.getElementById('deviasiList');
            const deviasiItems = logs.filter(l => l.diff !== 0);
            if(deviasiItems.length === 0) {
                list.innerHTML = `<p class="text-center py-10 text-[10px] text-slate-300 uppercase font-bold tracking-widest">Tidak ada deviasi</p>`;
                return;
            }
            list.innerHTML = deviasiItems.map(l => `
                <div class="bg-rose-50 p-4 rounded-xl border border-rose-100 flex justify-between items-center">
                    <div>
                        <div class="text-[10px] font-bold text-rose-900">${l.material}</div>
                        <div class="text-[8px] text-rose-400 font-medium">${l.time}</div>
                    </div>
                    <div class="text-right">
                        <p class="text-[12px] font-bold text-rose-600">${l.diff > 0 ? '+' : ''}${l.diff}</p>
                        <p class="text-[7px] font-bold text-rose-300 uppercase">Selisih</p>
                    </div>
                </div>
            `).join('');
        }

        function renderDashboard() {
            const total = inventory.length;
            const checked = inventory.filter(i => i.checked).length;
            document.getElementById('dashChecked').innerText = checked;
            document.getElementById('dashTotal').innerText = total;
            document.getElementById('dashBar').style.width = (total > 0 ? (checked/total)*100 : 0) + "%";
        }

        function navigateTo(id, title) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('headerTitle').innerText = title;
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            const targetNav = id === 'pageInputDetail' ? 'pageInputList' : id;
            const n = document.getElementById('nav-' + targetNav);
            if(n) n.classList.add('active');
            
            // Re-render konten setiap pindah tab agar data selalu segar
            if(id === 'pageInventory') renderInventoryList();
            if(id === 'pageHistory') renderHistory();
            if(id === 'pageDeviasi') renderDeviasi();
            
            window.scrollTo(0,0);
        }

        function showToast() {
            const t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => t.className = t.className.replace("show", ""), 2000);
        }
    </script>
</body>
</html>
